apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  generators:
    - clusters: {}
  template:
    metadata:
      name: 'ingress-nginx-{{name}}'
    spec:
      project: default
      source:
        repoURL: https://kubernetes.github.io/ingress-nginx
        chart: ingress-nginx
        targetRevision: 4.9.0
      destination:
        server: '{{server}}'
        namespace: ingress-nginx
