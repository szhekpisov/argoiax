name: 'Argoiax'
description: 'Detect and update outdated Helm chart versions in ArgoCD manifests'
branding:
  icon: 'refresh-cw'
  color: 'blue'

inputs:
  command:
    description: 'Command to run (scan or update)'
    required: false
    default: 'update'
  config:
    description: 'Path to argoiax.yaml config file'
    required: false
    default: 'argoiax.yaml'
  dir:
    description: 'Directory to scan for ArgoCD manifests'
    required: false
    default: '.'
  chart:
    description: 'Only check/update a specific chart name'
    required: false
  allow-major:
    description: 'Include major version updates'
    required: false
    default: 'false'
  max-prs:
    description: 'Maximum number of PRs to create'
    required: false
    default: '10'
  github-token:
    description: 'GitHub token for creating PRs and API access'
    required: false
    default: ${{ github.token }}
  log-level:
    description: 'Log level (debug, info, warn, error)'
    required: false
    default: 'info'

outputs:
  updates-found:
    description: 'Number of updates found'
    value: ${{ steps.run.outputs.updates-found }}
  prs-created:
    description: 'Number of PRs created'
    value: ${{ steps.run.outputs.prs-created }}

runs:
  using: 'composite'
  steps:
    - name: Detect install method
      id: detect
      shell: bash
      run: |
        if [[ "${{ github.action_ref }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
          echo "method=download" >> "$GITHUB_OUTPUT"
        else
          echo "method=build" >> "$GITHUB_OUTPUT"
        fi

    - name: Download argoiax binary
      if: steps.detect.outputs.method == 'download'
      shell: bash
      run: |
        VERSION="${{ github.action_ref }}"
        VERSION="${VERSION#v}"
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64) ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
        esac
        curl -sfL "https://github.com/szhekpisov/argoiax/releases/download/${{ github.action_ref }}/argoiax_${VERSION}_${OS}_${ARCH}.tar.gz" \
          | tar xz -C /usr/local/bin argoiax
        chmod +x /usr/local/bin/argoiax

    - name: Setup Go
      if: steps.detect.outputs.method == 'build'
      uses: actions/setup-go@v5
      with:
        go-version-file: ${{ github.action_path }}/go.mod

    - name: Build argoiax from source
      if: steps.detect.outputs.method == 'build'
      shell: bash
      run: |
        cd "${{ github.action_path }}"
        go build -o /usr/local/bin/argoiax .

    - name: Run argoiax
      id: run
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_DIR: ${{ inputs.dir }}
        INPUT_LOG_LEVEL: ${{ inputs.log-level }}
        INPUT_ALLOW_MAJOR: ${{ inputs.allow-major }}
        INPUT_MAX_PRS: ${{ inputs.max-prs }}
        INPUT_CHART: ${{ inputs.chart }}
        INPUT_REPO: ${{ github.repository }}
      run: |
        ARGS="$INPUT_COMMAND"
        ARGS="$ARGS --config $INPUT_CONFIG"
        ARGS="$ARGS --dir $INPUT_DIR"
        ARGS="$ARGS --log-level $INPUT_LOG_LEVEL"

        if [ "$INPUT_COMMAND" = "update" ]; then
          ARGS="$ARGS --repo $INPUT_REPO"
          ARGS="$ARGS --max-prs $INPUT_MAX_PRS"
          if [ "$INPUT_ALLOW_MAJOR" = "true" ]; then
            ARGS="$ARGS --allow-major"
          fi
        fi

        if [ -n "$INPUT_CHART" ]; then
          ARGS="$ARGS --chart $INPUT_CHART"
        fi

        OUTPUT=$(argoiax $ARGS 2>&1) || true
        echo "$OUTPUT"

        UPDATES=$(echo "$OUTPUT" | grep -oP '\d+(?= update\(s\) available)' || echo "0")
        PRS=$(echo "$OUTPUT" | grep -oP 'Created \K\d+(?= PR)' || echo "0")
        echo "updates-found=$UPDATES" >> "$GITHUB_OUTPUT"
        echo "prs-created=$PRS" >> "$GITHUB_OUTPUT"
