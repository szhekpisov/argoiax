name: Tests

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: "1.25.6"

      - name: Run tests
        run: go test ./...

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: "1.25.6"

      - name: Run fuzz tests
        run: |
          TARGETS=$(grep -r --include='*_test.go' -l 'func Fuzz' . || true)
          if [ -z "$TARGETS" ]; then
            echo "No fuzz targets found, skipping"
            exit 0
          fi
          for file in $TARGETS; do
            dir=$(dirname "$file")
            funcs=$(grep -oP 'func \KFuzz\w+' "$file")
            for target in $funcs; do
              echo "=== Fuzzing $target in $dir for 30s ==="
              go test -fuzz="^${target}$" -fuzztime=30s -run='^$' "$dir"
            done
          done

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: "1.25.6"

      - name: Run tests with coverage
        run: go test ./... -coverprofile=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
